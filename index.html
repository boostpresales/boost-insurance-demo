<script>

const BOOST_VOICE_ENDPOINT =
"https://adminpanel-adamtest.boost.ai/api/voice/v1/call";

let room = null;

async function startVoiceCall() {

  const modal = document.getElementById("callModal");
  const status = document.getElementById("callStatus");

  modal.style.display = "flex";

  try {

    status.innerText = "Starting voice session...";

    const response = await fetch(
      BOOST_VOICE_ENDPOINT,
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          entrypoint_id: 2
        })
      }
    );

    if (!response.ok) {
      throw new Error("Voice API returned " + response.status);
    }

    const data = await response.json();

    console.log(data);

    const livekitUrl = data.url;
    const accessToken = data.access_token;

    if (!livekitUrl || !accessToken) {
      throw new Error("Missing LiveKit credentials");
    }

    status.innerText = "Connecting to AI agent...";

    room = new LivekitClient.Room();

    await room.connect(
      livekitUrl,
      accessToken
    );

    await room.localParticipant.setMicrophoneEnabled(true);

    status.innerText = "Connected. You can speak now.";

    room.on(
      LivekitClient.RoomEvent.Disconnected,
      () => {
        modal.style.display = "none";
      }
    );

  } catch (error) {

    console.error(error);

    status.innerText =
      "Voice connection failed. Check console logs.";

  }

}

function endVoiceCall() {

  if (room) {
    room.disconnect();
    room = null;
  }

  document.getElementById("callModal").style.display = "none";

}

</script>
