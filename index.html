<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boost Insurance</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    .phone {
      width: 390px;
      max-width: 100%;
      min-height: 820px;
      background: white;
      border-radius: 36px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      position: relative;
    }

    .header {
      background: #007a5a;
      color: white;
      padding: 26px;
      border-bottom-left-radius: 30px;
      border-bottom-right-radius: 30px;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.1;
    }

    .sub {
      opacity: 0.9;
      margin-top: 6px;
      font-size: 15px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 24px;
      padding: 20px;
      margin-top: 24px;
    }

    .card p {
      margin: 0 0 12px 0;
    }

    .card h2 {
      margin: 0 0 14px 0;
      font-size: 24px;
    }

    .content {
      padding: 22px;
      padding-bottom: 95px;
    }

    .button {
      width: 100%;
      border: none;
      padding: 18px;
      border-radius: 24px;
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 14px;
      cursor: pointer;
    }

    .voice {
      background: #007a5a;
      color: white;
    }

    .chat {
      background: #f1f1f1;
      color: black;
    }

    .tiles {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .tile {
      background: #f1f1f1;
      padding: 19px;
      border-radius: 20px;
    }

    .tile-title {
      font-weight: bold;
      font-size: 17px;
      margin-bottom: 8px;
    }

    .tile-text {
      color: #666;
      font-size: 14px;
      line-height: 1.35;
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-around;
      padding: 14px 0;
      background: white;
    }

    .nav-item {
      text-align: center;
      font-size: 13px;
      color: #777;
    }

    .active {
      color: #007a5a;
      font-weight: bold;
    }

    @media (max-width: 430px) {
      body {
        padding: 0;
        align-items: stretch;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        box-shadow: none;
      }

      .header {
        border-bottom-left-radius: 28px;
        border-bottom-right-radius: 28px;
        padding-top: 32px;
      }
    }
  </style>
</head>

<body>

  <div class="phone">

    <div class="header">
      <div class="logo">BOOST INSURANCE</div>
      <div class="sub">Welcome back Adam</div>

      <div class="card">
        <p>Your Policy</p>
        <h2>Ford Fiesta ST</h2>
        <p>Policy Number: ACR-102938</p>
      </div>
    </div>

    <div class="content">

      <button class="button voice">
        🎤 Speak with AI Agent
      </button>

      <button class="button chat">
        💬 Chat with AI Agent
      </button>

      <div class="tiles">

        <div class="tile">
          <div class="tile-title">Make a Claim</div>
          <div class="tile-text">
            Start a new motor insurance claim
          </div>
        </div>

        <div class="tile">
          <div class="tile-title">View Documents</div>
          <div class="tile-text">
            Access policy documents and renewal info
          </div>
        </div>

      </div>

    </div>

    <div class="bottom-nav">
      <div class="nav-item active">Home</div>
      <div class="nav-item">Policies</div>
      <div class="nav-item">Claims</div>
      <div class="nav-item">Settings</div>
    </div>

  </div>

</body>
</html>
